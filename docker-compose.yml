services:
  db:
    image: mysql:8.0
    container_name: fingenie-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fingenie
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
    container_name: fingenie-backend
    environment:
      DATABASE_URL: mysql+pymysql://root:root@db:3306/fingenie?charset=utf8mb4
      CORS_ORIGINS: '["http://localhost:5173","http://127.0.0.1:5173"]'
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: fingenie-frontend
    environment:
      VITE_API_URL: http://localhost:8000/api
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  mysql_data:
